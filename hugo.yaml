baseURL: "https://LFLmLXY.github.io"
title: "LFL's Blog"
copyright: "[©2025 LFL's Blog](https://LFLmLXY.github.io/)"
theme: PaperMod
languageCode: zh-cn

enableInlineShortcodes: true
hasCJKLanguage: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
pagination.pagerSize: 5
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false

languages:
  zh:
    languageName: "中文"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
    menus:
      main:
        - name: 首页
          pageRef: /
          weight: 1
        - name: 归档
          pageRef: archives/
          weight: 5
        - name: 分类
          pageRef: categories/
          weight: 10
        - name: 标签
          pageRef: tags/
          weight: 10
        - name: 搜索
          pageRef: search/
          weight: 20
        - name: 关于
          pageRef: about/
          weight: 21

params:
  env: production
  title: "LFL's Blog"
  description: "LFL 的个人技术博客 — 记录学习与探索"
  keywords: [Hugo, Blog, 技术博客, Linux, Docker, 编程]
  author: LFL
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  assets:
    favicon: "feather.png"
    favicon16x16: "feather.png"
    favicon32x32: "feather.png"
    apple_touch_icon: "feather.png"
    safari_pinned_tab: "feather.png"
    disableHLJS: true

  giscus:
    repo: "LFLmLXY/LFLmLXY.github.io"
    repoId: "R_kgDOOCMVLQ"
    category: "Announcements"
    categoryId: "DIC_kwDOOCMVLc4CngOH"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    lightTheme: "light"
    darkTheme: "dark"
    lang: "zh-CN"
    crossorigin: "anonymous"

  label:
    text: "LFL's Blog"
    icon: "R-C.jpeg"
    iconHeight: 45

  profileMode:
    enabled: false
    title: Welcome to my Blog
    subtitle: ""
    imageUrl: "blog.jpg"
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image

  homeInfoParams:
    Title: "🐱 相信奇迹的人本身就和奇迹一样了不起 ✨"
    Content: Welcome to my blog

  socialIcons:
    - name: github
      url: "https://github.com/LFLmLXY"

  # analytics:
  #   google:
  #     SiteVerificationTag: ""
  #   bing:
  #     SiteVerificationTag: ""
  #   yandex:
  #     SiteVerificationTag: ""

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  editPost:
    URL: "https://github.com/LFLmLXY/LFLmLXY.github.io/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]
    includeMatches: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    anchorLineNos: false
    codeFences: true
    noClasses: false
    lineNos: true
    lineNumbersInTable: false

outputs:
  home:
    - HTML
    - RSS
    - JSON
